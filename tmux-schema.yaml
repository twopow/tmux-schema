sessions:
  - name: work
    windows:
      - name: projects
        dir: ~/projects
      - name: split-view
        dir: ~/projects
        layout:
          split: vertical
          left:
            cmd: echo world
          right:
            split: horizontal
            top:
            bottom:

  - name: play
    windows:
      - name: play
        dir: ~/play
        cmd: ls
        layout:
          split: vertical
          left:
          right:
            dir: ~/play/sandbox
            cmd: echo hello
